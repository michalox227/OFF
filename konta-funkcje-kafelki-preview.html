<!doctype html>
<html lang='pl'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>GO ON [OFF] SHORE — Kafelki Kont i Funkcji</title>
<link rel='preconnect' href='https://fonts.googleapis.com'>
<link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
<link href='https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap' rel='stylesheet'>
<style>
:root{--bg:#050505;--panel:#101010;--card:#151515;--text:#eee;--muted:#9a9a9a;--line:rgba(255,255,255,.11);--orange:#ff6b2a}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:radial-gradient(circle at 80% 10%,rgba(255,107,42,.14),transparent 32%),#050505;color:var(--text);font-family:Inter,system-ui,sans-serif}.layout{display:grid;grid-template-columns:360px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;overflow:auto;background:linear-gradient(180deg,#141414,#060606);border-right:1px solid var(--line);padding:24px}.logo{font-family:'Inter Tight';font-size:30px;margin-bottom:22px}.off{color:var(--orange)}.label{font-size:11px;text-transform:uppercase;letter-spacing:.32em;color:var(--muted);margin:22px 0 12px}.account-btn{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:14px;border-radius:16px;margin-bottom:10px;display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center}.account-btn:hover,.account-btn.active{background:rgba(255,255,255,.06);box-shadow:inset 3px 0 0 var(--orange)}.icon{width:30px;height:30px;border:1px solid rgba(255,107,42,.35);border-radius:10px;display:grid;place-items:center;color:var(--orange);font-size:12px;font-weight:900}.account-title{font-weight:850;font-size:14px}.account-type{display:block;font-size:11px;color:var(--muted);margin-top:2px}.count{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:4px 7px;background:rgba(255,255,255,.04)}.main{padding:46px 60px 80px}.hero{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.018));padding:30px;margin-bottom:22px}.badge{display:inline-flex;border:1px solid rgba(255,107,42,.35);background:rgba(255,107,42,.08);border-radius:999px;padding:7px 10px;color:#fff;font-size:12px;font-weight:850;margin:0 6px 8px 0}.hero h1{font-family:'Inter Tight';font-size:clamp(42px,5vw,78px);line-height:.92;letter-spacing:-.05em;margin:6px 0 12px}.hero p{max-width:920px;color:var(--muted);line-height:1.55}.toolbar{display:grid;grid-template-columns:1fr repeat(3,160px);gap:12px;margin:22px 0}.toolbar input,.toolbar select{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:14px;color:#fff;padding:13px 14px;outline:none}.metric{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.035);padding:10px 14px}.metric span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.16em}.metric strong{font-size:20px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.tile{border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018));padding:18px;min-height:190px}.tile:hover{border-color:rgba(255,107,42,.38);background:linear-gradient(180deg,rgba(255,107,42,.08),rgba(255,255,255,.018))}.tile-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.tile-icon{font-size:28px}.nr{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 8px}.tile h3{font-size:20px;line-height:1.12;margin-bottom:7px}.tile h4{font-size:12px;line-height:1.35;color:var(--orange);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}.tile p{color:var(--muted);font-size:14px;line-height:1.5}.tile-foot{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.chip{font-size:11px;color:#ddd;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:rgba(255,255,255,.035)}.hidden{display:none}@media(max-width:1100px){.layout{display:block}.side{position:relative;height:auto}.main{padding:32px 20px}.grid{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class='layout'>
  <aside class='side'>
    <div class='logo'>GO ON <span class='off'>[OFF]</span> SHORE</div>
    <div class='label'>Konta & Funkcje</div>
    <div id='accountMenu'></div>
  </aside>
  <main class='main'>
    <section id='hero' class='hero'></section>
    <section class='toolbar'>
      <input id='search' placeholder='Szukaj kafelka, warstwy albo opisu...'>
      <select id='layerFilter'><option value=''>Wszystkie warstwy</option></select>
      <div class='metric'><span>Konto</span><strong id='accountMetric'>0</strong></div>
      <div class='metric'><span>Wszystkie kafelki</span><strong id='totalMetric'>0</strong></div>
    </section>
    <section id='tiles' class='grid'></section>
  </main>
</div>
<script src='data/konta-funkcje/kafelki-funkcji.js'></script>
<script>
const data=window.GO_ON_KONTA_FUNKCJE_KAFELKI||[];
let active=data[0]?.account||'';
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
function total(){return data.reduce((s,a)=>s+a.tiles.length,0)}
function renderMenu(){accountMenu.innerHTML=data.map(a=>`<button class='account-btn ${a.account===active?'active':''}' data-account='${esc(a.account)}'><span class='icon'>${esc(a.account.includes('Firma')?'F':a.account.includes('Partner')?'P':'U')}</span><span><span class='account-title'>${esc(a.account)}</span><span class='account-type'>${esc(a.type)}</span></span><span class='count'>${a.tiles.length}</span></button>`).join('')}
function renderLayers(acc){const layers=[...new Set(acc.tiles.map(t=>t.layer))];layerFilter.innerHTML='<option value="">Wszystkie warstwy</option>'+layers.map(l=>`<option>${esc(l)}</option>`).join('')}
function render(){const acc=data.find(a=>a.account===active)||data[0];if(!acc)return;hero.innerHTML=`<span class='badge'>${esc(acc.type)}</span><h1>${esc(acc.account)}</h1><p>${esc(acc.description)}</p><div><span class='badge'>${acc.tiles.length} kafelków funkcji</span><span class='badge'>Dane do panelu Ustawienia</span></div>`;accountMetric.textContent=acc.tiles.length;totalMetric.textContent=total();renderMenu();renderLayers(acc);renderTiles()}
function renderTiles(){const acc=data.find(a=>a.account===active)||data[0];const q=search.value.trim().toLowerCase();const layer=layerFilter.value;tiles.innerHTML=acc.tiles.map(t=>{const text=[t.title,t.subtitle,t.layer,t.summary,t.status].join(' ').toLowerCase();const hide=(q&&!text.includes(q))||(layer&&t.layer!==layer);return `<article class='tile ${hide?'hidden':''}'><div class='tile-head'><span class='tile-icon'>${esc(t.icon)}</span><span class='nr'>#${String(t.nr).padStart(2,'0')}</span></div><h3>${esc(t.title)}</h3><h4>${esc(t.subtitle)}</h4><p>${esc(t.summary)}</p><div class='tile-foot'><span class='chip'>${esc(t.layer)}</span><span class='chip'>${esc(t.status)}</span><span class='chip'>${esc(t.id)}</span></div></article>`}).join('')}
document.addEventListener('click',e=>{const b=e.target.closest('[data-account]');if(!b)return;active=b.dataset.account;search.value='';render()});search.addEventListener('input',renderTiles);layerFilter.addEventListener('change',renderTiles);render();
</script>
</body>
</html>
